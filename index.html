<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="left-side-page">
        <div class="logo">
            <img src="./images/loog_nike2-removebg-preview.png" alt="logo">
        </div>
        <div class="author">
            <p>Photo by Me</p>
        </div>
    </div>
    <div class="right-side-page">
        <div class="header">
            <h1>This is not a real online service, it's just a project
                to test out my skills with web forms
            </h1>
            <h2>I hope you will find it interesting!</h2>
        </div>
        <div class="content">
            <h1>Let's do this!</h1>
            <form action="" method="get">
                <div class="form-controls">
                    <div class="text-control">
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name" name="first_name">
                    </div>
                    <div class="text-control">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name" name="last-name">
                    </div>
                    <div class="email-control">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="phone-control">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="pass-control">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password">
                    </div>
                    <div class="pass-control">
                        <label for="re-password">CONFIRM PASSWORD</label>
                        <input type="password" id="re-password" name="re-password">
                    </div>
                </div>
                <div class="submit-btn">
                    <button type="submit">Create Account</button>
                </div>
            </form>
        </div>
        <div class="footer">
            <h2>Already have an account? <a href="">Log in</a></h2>
        </div>
    </div>
</body>
</html>
